name: Update unpdf formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag, for example unpdf-v4.0.0-preview.1"
        required: false
        type: string
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

concurrency:
  group: update-unpdf-formula
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Resolve release manifest
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$REQUESTED_TAG"
          if [ -z "$tag" ]; then
            tag="$(gh api repos/erikbra/pdfbox-net/releases --jq '[.[] | select(.tag_name | startswith("unpdf-v"))][0].tag_name')"
          fi
          test -n "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "manifest=https://github.com/erikbra/pdfbox-net/releases/download/$tag/release-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: >-
          python scripts/update_homebrew_formula.py
          --manifest "${{ steps.release.outputs.manifest }}"
          --output Formula/unpdf.rb

      - name: Commit update
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/unpdf.rb; then
            echo "Formula already matches ${{ steps.release.outputs.tag }}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/unpdf.rb
          git commit -m "Update unpdf for ${{ steps.release.outputs.tag }}"
          git push origin HEAD:main
